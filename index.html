<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="description" content="Stadium IQ — pin the stadium on the map. 5 rounds, distance-based scoring." />
<meta name="theme-color" content="#0e1626" />
<title>Stadium IQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  :root{
    --bg:#0e1626; --bg2:#0a1019; --panel:#16203a; --panel2:#1d2a47;
    --line:#2b3a5e; --land:#243457; --land-hi:#34487a; --border:#5d72a6;
    --ink:#eef2f9; --muted:#8d9bb8; --turf:#35d07a; --amber:#ffb23e; --chalk:#f4f7ff;
    --mlb:#d24b4b; --nfl:#5b9cff; --nba:#c07bff;
  }
  *{box-sizing:border-box}
  html,body{margin:0; height:100%}
  body.playing{overflow:hidden; overscroll-behavior:none; touch-action:manipulation}
  #app{
    font-family:"Oswald", ui-sans-serif, system-ui, -apple-system, sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 500px at 50% -10%, #1a2747 0%, transparent 60%),
      linear-gradient(180deg,var(--bg) 0%, var(--bg2) 100%);
    min-height:100vh; padding:18px; max-width:980px; margin:0 auto;
  }
  body.playing #app{
    height:100dvh; min-height:0;
    display:flex; flex-direction:column;
    padding-top:max(10px, env(safe-area-inset-top));
  }
  .num{font-family:ui-monospace,"SFMono-Regular",Menlo,monospace; font-variant-numeric:tabular-nums;}
  .top{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:14px;}
  .brand{font-weight:700; letter-spacing:.14em; text-transform:uppercase; font-size:22px;}
  .brand b{color:var(--amber)}
  .meters{display:flex; gap:18px; align-items:baseline}
  .meter{display:flex; flex-direction:column; align-items:flex-end; line-height:1}
  .meter .k{font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted)}
  .meter .v{font-size:20px; font-weight:700}
  .meter .v.score{color:var(--amber)}
  .meter .v.hi{color:var(--turf); font-size:14px}
  .meter .v.score.bump{animation:scoreBump .35s ease}
  @keyframes scoreBump{0%,100%{transform:scale(1)}40%{transform:scale(1.12)}}

  .round{animation:fadeIn .35s ease}
  body.playing .round{
    flex:1; min-height:0; display:flex; flex-direction:column;
    animation:none;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){
    .round,.meter .v.score.bump,.pin-pulse{animation:none!important}
    .photo .cap,.photo .tag,.result{transition:none}
  }

  /* ---- photo hero: uniform frame, any source size cropped via cover ---- */
  .photo{position:relative; width:100%; max-width:680px; aspect-ratio:16/9;
    margin:0 auto 12px; border-radius:14px; overflow:hidden;
    border:1px solid var(--line); background:#0c1322;}
  .photo img{width:100%; height:100%; object-fit:cover; display:block; transition:transform .6s ease}
  .photo.revealed img{transform:scale(1.03)}
  .photo .tag{position:absolute; top:12px; left:14px; font-size:11px; font-weight:700;
    letter-spacing:.18em; text-transform:uppercase; color:var(--chalk);
    background:rgba(8,12,20,.55); border:1px solid rgba(255,255,255,.12);
    padding:5px 10px; border-radius:999px; backdrop-filter:blur(3px); transition:opacity .25s;}
  .photo .cap{position:absolute; left:0; right:0; bottom:0; padding:16px 16px 14px;
    background:linear-gradient(transparent, rgba(8,12,20,.92)); opacity:0; transition:opacity .3s;}
  .photo.revealed .cap{opacity:1}
  .photo.revealed .tag{opacity:0}
  .cap .chip{display:inline-block; font-size:10px; font-weight:700; letter-spacing:.16em;
    text-transform:uppercase; padding:3px 8px; border-radius:999px; color:#0a0f1a; margin-bottom:7px;}
  .cap .team{font-size:24px; font-weight:700; line-height:1.05}
  .cap .venue{font-size:13px; color:#cdd6e8; letter-spacing:.04em; margin-top:2px}

  .mapwrap{position:relative; background:var(--bg2); border:1px solid var(--line);
    border-radius:14px; overflow:hidden;}
  body.playing .mapwrap{flex:1; min-height:0; display:flex; align-items:center; justify-content:center; border-radius:10px}
  svg.map{display:block; width:100%; height:auto; cursor:crosshair; touch-action:manipulation;}
  body.playing svg.map{flex:0 1 auto; width:100%; height:auto; max-height:100%; min-height:0}
  .state{fill:var(--land); stroke:var(--border); stroke-width:1; vector-effect:non-scaling-stroke;
    stroke-linejoin:round; transition:fill .12s;}
  svg.map:not(.locked) .state:hover,svg.map:not(.locked) .state:focus{fill:var(--land-hi)}
  .pin-pulse{animation:pinPulse .6s ease-out; transform-box:fill-box; transform-origin:center}
  @keyframes pinPulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(2.8);opacity:0}}
  .hint{position:absolute; left:0; right:0; bottom:0; padding:8px 12px;
    font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted);
    background:linear-gradient(180deg,transparent,rgba(10,16,25,.85)); pointer-events:none;}

  .bar{display:flex; gap:10px; align-items:center; margin-top:12px; min-height:46px}
  .dock{flex-shrink:0}
  body.playing .dock{
    margin-top:8px;
    padding-bottom:max(10px, env(safe-area-inset-bottom));
  }
  body.playing .bar{margin-top:0; min-height:0}
  .result{flex:1 1 auto; display:flex; gap:18px; align-items:baseline; opacity:0; transition:opacity .25s}
  .result.show{opacity:1}
  .result .dist{font-size:22px; font-weight:700}
  .result .pts{font-size:22px; font-weight:700; color:var(--amber)}
  .result .lbl{font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin-right:4px}
  .result .perfect{color:var(--turf); font-size:13px; font-weight:700; letter-spacing:.1em; text-transform:uppercase}
  button{font-family:inherit; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
    font-size:14px; color:#0a0f1a; background:var(--amber); border:0; border-radius:10px;
    padding:13px 22px; cursor:pointer; transition:transform .06s, filter .15s;}
  button:hover{filter:brightness(1.06)} button:active{transform:translateY(1px)}
  button:focus-visible{outline:2px solid var(--chalk); outline-offset:2px}
  button:disabled{background:#33405e; color:#7c89a6; cursor:not-allowed; filter:none}
  button.ghost{background:transparent; color:var(--muted); border:1px solid var(--line); padding:11px 18px}
  button.ghost:hover{color:var(--ink); border-color:var(--border); filter:none}

  .end{text-align:center; padding:26px 16px}
  .grade{font-size:54px; font-weight:700; letter-spacing:.02em; line-height:1}
  .endscore{font-size:18px; color:var(--muted); margin:10px 0 4px; letter-spacing:.06em}
  .endscore b{color:var(--amber); font-size:30px}
  .breakdown{max-width:520px; margin:18px auto 0; text-align:left}
  .brow{display:flex; justify-content:space-between; padding:9px 12px; border-bottom:1px solid var(--line); font-size:14px}
  .brow .bteam{color:var(--ink); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .brow .bpts{color:var(--amber); font-weight:700; flex-shrink:0}
  .brow .bdist{font-size:12px; margin-left:auto; margin-right:14px; flex-shrink:0}
  .brow .bdist.great{color:var(--turf)} .brow .bdist.good{color:var(--nfl)} .brow .bdist.ok{color:var(--muted)} .brow .bdist.poor{color:#d24b4b}
  .stats{display:flex; gap:24px; justify-content:center; flex-wrap:wrap; margin:16px 0 4px}
  .stat{text-align:center; line-height:1.2}
  .stat .sk{font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted)}
  .stat .sv{font-size:20px; font-weight:700; margin-top:2px}
  .hiscore{font-size:11px; color:var(--turf); letter-spacing:.08em; margin-top:6px}
  .hiscore.new{color:var(--amber); font-weight:700}
  .endbtns{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:22px}

  body.playing #game{flex:1; min-height:0; display:flex; flex-direction:column; overflow:hidden}
  body.playing .top{margin-bottom:10px; flex-shrink:0; align-items:center}
  body.playing .mapwrap{flex:1; min-height:180px}
  body.playing .photo{flex-shrink:0; margin-bottom:8px}

  @media (max-width:640px){
    body.playing #app{max-width:none; padding:max(8px, env(safe-area-inset-top)) 10px 0}
    body.playing .top{margin-bottom:6px}
    body.playing .brand{font-size:17px}
    body.playing .meters{gap:14px}
    body.playing .meter .k{font-size:8px; letter-spacing:.14em}
    body.playing .meter .v{font-size:16px}
    body.playing .meter .v.hi{font-size:13px}
    body.playing .photo{
      max-width:none;
      aspect-ratio:2.1/1; max-height:min(26dvh, 148px);
      margin-bottom:6px; border-radius:10px;
    }
    body.playing .photo .tag{font-size:9px; padding:4px 8px; top:8px; left:10px; letter-spacing:.12em}
    body.playing .photo .cap{padding:10px 12px 8px}
    body.playing .cap .team{font-size:17px}
    body.playing .cap .venue{font-size:11px}
    body.playing .cap .chip{font-size:9px; padding:2px 6px; margin-bottom:4px}
    body.playing .mapwrap{border-radius:10px; min-height:0; flex:0 1 auto; max-height:min(46dvh, 300px)}
    body.playing svg.map{flex:0 0 auto; width:100%; height:auto; max-height:none}
    body.playing .hint{font-size:10px; padding:5px 10px; letter-spacing:.06em}
    body.playing .dock{
      margin-top:6px;
      background:linear-gradient(180deg, transparent, var(--bg2) 28%);
    }
    body.playing .bar{margin-top:0; min-height:0; gap:8px}
    body.playing .bar:not(:has(.result.show)){flex-direction:column; align-items:stretch}
    body.playing .bar:not(:has(.result.show)) button{width:100%}
    body.playing .result{gap:12px; flex-wrap:wrap; align-items:center}
    body.playing .result .dist, body.playing .result .pts{font-size:17px}
    body.playing .result .lbl{font-size:8px; margin-right:2px}
    body.playing .result .perfect{font-size:10px; width:100%; margin-bottom:-2px}
    body.playing button{padding:12px 18px; font-size:12px; border-radius:9px; white-space:nowrap}
    body.playing .bar:has(.result.show) button{flex-shrink:0; min-width:118px}
  }

  @media (max-width:560px){
    .cap .team{font-size:20px}
    .meter .v{font-size:17px}
    .grade{font-size:42px}
    body.playing .meter--best{display:none}
    .end{padding:18px 8px 24px}
    .stats{gap:16px}
    .stat .sv{font-size:17px}
    .brow{font-size:13px; padding:8px 10px}
  }
  @media (max-width:380px){
    body.playing .brand{font-size:15px; letter-spacing:.1em}
    body.playing .meters{gap:10px}
    body.playing .photo{max-height:min(24dvh, 130px)}
  }
</style>
</head>
<body>

<div id="app">
  <div class="top">
    <div class="brand">Stadium<b>IQ</b></div>
    <div class="meters">
      <div class="meter"><span class="k">Round</span><span class="v num" id="mRound">1/5</span></div>
      <div class="meter"><span class="k">Score</span><span class="v score num" id="mScore">0</span></div>
      <div class="meter meter--best"><span class="k">Best</span><span class="v hi num" id="mBest">—</span></div>
    </div>
  </div>
  <div id="game"></div>
</div>

<script>

const HS_KEY = "stadiumIQ_best";
const PERFECT_MI = 25;

const MOCK_SIZES = [[1600,900],[1080,1350],[1000,1000],[2000,840],[1200,1600]];
function mockPhoto(w,h,hex,label,team){
  const abbr=team.split(" ").pop().slice(0,3).toUpperCase();
  const svg=
    "<svg xmlns='http://www.w3.org/2000/svg' width='"+w+"' height='"+h+"' viewBox='0 0 "+w+" "+h+"'>"
    +"<defs><linearGradient id='s' x1='0' y1='0' x2='0' y2='1'>"
    +"<stop offset='0' stop-color='#13203a'/><stop offset='1' stop-color='#0a1322'/></linearGradient></defs>"
    +"<rect width='"+w+"' height='"+h+"' fill='url(#s)'/>"
    +"<ellipse cx='"+(w/2)+"' cy='"+(h*0.72)+"' rx='"+(w*0.42)+"' ry='"+(h*0.16)+"' fill='#16351f' stroke='"+hex+"' stroke-width='3'/>"
    +"<ellipse cx='"+(w/2)+"' cy='"+(h*0.72)+"' rx='"+(w*0.24)+"' ry='"+(h*0.085)+"' fill='none' stroke='#2f6b3e' stroke-width='2'/>"
    +"<path d='M"+(w*0.06)+" "+(h*0.74)+" Q"+(w*0.5)+" "+(h*0.92)+" "+(w*0.94)+" "+(h*0.74)+" L"+(w*0.94)+" "+(h*0.58)+" Q"+(w*0.5)+" "+(h*0.72)+" "+(w*0.06)+" "+(h*0.58)+" Z' fill='"+hex+"' opacity='.16'/>"
    +"<g fill='"+hex+"'><circle cx='"+(w*0.24)+"' cy='"+(h*0.2)+"' r='6'/><circle cx='"+(w*0.5)+"' cy='"+(h*0.14)+"' r='6'/><circle cx='"+(w*0.76)+"' cy='"+(h*0.2)+"' r='6'/></g>"
    +"<text x='"+(w/2)+"' y='"+(h*0.38)+"' fill='"+hex+"' font-family='sans-serif' font-size='"+Math.round(Math.min(w,h)*0.12)+"' font-weight='700' text-anchor='middle' opacity='.35'>"+abbr+"</text>"
    +"<text x='"+(w/2)+"' y='"+(h*0.48)+"' fill='#9fb0d0' font-family='monospace' font-size='"+Math.round(Math.min(w,h)*0.045)+"' text-anchor='middle' letter-spacing='3'>STADIUM PHOTO</text>"
    +"<text x='"+(w/2)+"' y='"+(h*0.48+Math.min(w,h)*0.06)+"' fill='#5d72a6' font-family='monospace' font-size='"+Math.round(Math.min(w,h)*0.035)+"' text-anchor='middle'>"+label+"</text>"
    +"</svg>";
  return "data:image/svg+xml,"+encodeURIComponent(svg);
}
function stadiumPhoto(s,idx){
  if(s[5]) return s[5];
  const hex=LEAGUE_HEX[s[0]];
  const [pw,ph]=MOCK_SIZES[idx % MOCK_SIZES.length];
  return mockPhoto(pw,ph,hex,pw+"\u00d7"+ph,s[1]);
}

const VIEW_W=960, VIEW_H=560, ROUNDS=5, MAX_PER=5000, PHOTOS_ONLY=true;
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function haversineMi(lat1,lon1,lat2,lon2){const R=3958.8,t=Math.PI/180;const dLat=(lat2-lat1)*t,dLon=(lon2-lon1)*t;const a=Math.sin(dLat/2)**2+Math.cos(lat1*t)*Math.cos(lat2*t)*Math.sin(dLon/2)**2;return 2*R*Math.asin(Math.sqrt(a));}
function pointsFor(mi){return Math.round(MAX_PER*Math.exp(-mi/240));}
function commaNum(n){return n.toLocaleString("en-US");}
function distClass(mi){if(mi<=50)return"great";if(mi<=200)return"good";if(mi<=500)return"ok";return"poor";}
function getBest(){const v=localStorage.getItem(HS_KEY);return v?+v:null;}
function setBest(n){localStorage.setItem(HS_KEY,String(n));}
function showBest(){
  const el=document.getElementById("mBest"), b=getBest();
  el.textContent=b!=null?commaNum(b):"\u2014";
}
function bumpScore(){
  const el=document.getElementById("mScore");
  el.classList.remove("bump"); void el.offsetWidth; el.classList.add("bump");

20754187541,29.055898073770734],[-90.75020754187541,29.055898073770734],[-90.75020754187541,29.055898073770734]]],[[[-92.01722832138321,29.591092261012605],[-92.01722832138321,29.591092261012605],[-92.01722832138321,29.591092261012605],[-92.01722832138321,29.591092261012605]]],[[[-94.04159013340133,33.01959948618486],[-91.16656564505645,33.00413641175411],[-91.63676315813157,30.999091093900937],[-89.75238381183811,31.001668272972722],[-89.5262582902829,30.180407208762084],[-89.5083118203182,29.385776994959947],[-90.8112255397554,29.04215311872118],[-91.88801373763737,29.83592427283272],[-93.83700037580375,29.690743185121846],[-93.53191038640387,31.184647987069866],[-94.04159013340133,33.01959948618486]]]]}},{"type":"Feature","properties":{"name":"Rhode Island"},"geometry":{"type":"MultiPolygon","coordinates":[[[[-71.19573386833868,41.67548492863928],[-71.12035869448694,41.49765957268572],[-71.19573386833868,41.67548492863928],[-71.19573386833868,41.67548492863928]]],[[[-71.36443068600686,41.660880913899135],[-71.36443068600686,41.660880913899135],[-71.36443068600686,41.660880913899135],[-71.36443068600686,41.660880913899135]]],[[[-71.40032362593625,41.460720005990055],[-71.40032362593625,41.460720005990055],[-71.40032362593625,41.460720005990055],[-71.40032362593625,41.460720005990055]]],[[[-71.61209197151972,41.160049114281136],[-71.61209197151972,41.160049114281136],[-71.61209197151972,41.160049114281136],[-71.61209197151972,41.160049114281136]]],[[[-71.85975325703257,41.31983421673216],[-71.7987352591526,42.007941028900284],[-71.2244482202822,41.710706375953755],[-71.85975325703257,41.31983421673216]]]]}}]};
const US48={type:"FeatureCollection",features:US.features.filter(f=>f.properties.name!=="Alaska"&&f.properties.name!=="Hawaii")};
let deck, idx, total, results, projection, locked, guessLL;

function start(){
  document.body.classList.add("playing");
  const pool=PHOTOS_ONLY?STADIUMS.filter(s=>s[5]):STADIUMS;
  deck=shuffle(pool).slice(0,Math.min(ROUNDS,pool.length));
  idx=0; total=0; results=[]; showBest(); renderRound();
}

function renderRound(){
  locked=false; guessLL=null;
  const s=deck[idx], hex=LEAGUE_HEX[s[0]];
  const src=stadiumPhoto(s,idx);
  document.getElementById("mRound").textContent=(idx+1)+"/"+deck.length;
  document.getElementById("mScore").textContent=commaNum(total);
  document.getElementById("game").innerHTML=`
    <div class="round">
    <div class="photo" id="photo">
      <img src="${src}" alt="Stadium aerial view — guess the location" />
      <div class="tag">Round ${idx+1} \u00b7 Pin it</div>
      <div class="cap">
        <span class="chip" style="background:${hex}">${s[0]}</span>
        <div class="team">${s[1]}</div>
        <div class="venue">${s[2]}</div>
      </div>
    </div>
    <div class="mapwrap">
      <svg class="map" id="map" viewBox="0 0 ${VIEW_W} ${VIEW_H}" preserveAspectRatio="xMidYMid meet" role="img" aria-label="United States map — tap to place your guess"></svg>
      <div class="hint" id="hint">Tap map to pin</div>
    </div>
    <div class="dock">
    <div class="bar">
      <div class="result" id="result"></div>
      <button id="action" disabled>Lock in</button>
    </div>
    </div>
    </div>`;
  drawMap();
  const btn=document.getElementById("action");
  btn.onclick=onAction;
  document.addEventListener("keydown",onKey);
}

function onKey(e){
  if(e.key!=="Enter"&&e.key!==" ") return;
  const btn=document.getElementById("action");
  if(!btn||btn.disabled) return;
  e.preventDefault(); onAction();
}

function drawMap(){
  const svg=d3.select("#map");
  projection=d3.geoAlbers().fitSize([VIEW_W,VIEW_H],US48);
  const path=d3.geoPath(projection);
  svg.append("g").selectAll("path").data(US48.features).join("path").attr("class","state").attr("d",path);
  svg.append("g").attr("id","pins");
  const el=document.getElementById("map");
  el.addEventListener("click",onMapClick);
  el.addEventListener("touchstart",onMapTouch,{passive:false});
}
function svgXY(evt){
  const svg=document.getElementById("map");
  const clientPt=evt.touches?evt.touches[0]:evt.changedTouches?evt.changedTouches[0]:evt;
  const pt=svg.createSVGPoint();
  pt.x=clientPt.clientX;
  pt.y=clientPt.clientY;
  const svgPt=pt.matrixTransform(svg.getScreenCTM().inverse());
  return [svgPt.x,svgPt.y];
}
function placePin(x,y,ll){
  guessLL=ll;
  const pins=d3.select("#pins"); pins.selectAll("*").remove();
  pins.append("circle").attr("class","pin-pulse").attr("cx",x).attr("cy",y).attr("r",8).attr("fill","none").attr("stroke","var(--amber)").attr("stroke-width",2).attr("pointer-events","none");
  pins.append("circle").attr("cx",x).attr("cy",y).attr("r",8).attr("fill","none").attr("stroke","var(--amber)").attr("stroke-width",3);
  pins.append("circle").attr("cx",x).attr("cy",y).attr("r",2.5).attr("fill","var(--amber)");
  document.getElementById("action").disabled=false;
  document.getElementById("hint").textContent="Tap to lock in";
}
function onMapClick(evt){if(locked) return; const [x,y]=svgXY(evt); const ll=projection.invert([x,y]); if(!ll) return; placePin(x,y,ll);}
function onMapTouch(evt){if(locked) return; evt.preventDefault(); const [x,y]=svgXY(evt); const ll=projection.invert([x,y]); if(!ll) return; placePin(x,y,ll);}
function onAction(){
  if(!locked){lockIn();}
  else{document.removeEventListener("keydown",onKey); idx++; if(idx>=deck.length) endGame(); else renderRound();}
}

function lockIn(){
  if(locked||!guessLL) return;
  locked=true; document.getElementById("map").classList.add("locked");
  document.getElementById("action").disabled=true;
  const s=deck[idx];
  const [tx,ty]=projection([s[4],s[3]]); const [gx,gy]=projection(guessLL);
  const mi=haversineMi(guessLL[1],guessLL[0],s[3],s[4]); const pts=pointsFor(mi); total+=pts;
  results.push({team:s[1],venue:s[2],mi,pts});
  const pins=d3.select("#pins");
  pins.append("line").attr("x1",gx).attr("y1",gy).attr("x2",gx).attr("y2",gy).attr("stroke","var(--chalk)").attr("stroke-width",2).attr("stroke-dasharray","6 6").transition().duration(450).attr("x2",tx).attr("y2",ty);
  const g=pins.append("g").attr("opacity",0);
  g.append("circle").attr("cx",tx).attr("cy",ty).attr("r",16).attr("fill","var(--turf)").attr("opacity",.18);
  g.append("circle").attr("cx",tx).attr("cy",ty).attr("r",6).attr("fill","var(--turf)").attr("stroke","#0a0f1a").attr("stroke-width",1.5);
  g.transition().delay(250).duration(300).attr("opacity",1);
  document.getElementById("photo").classList.add("revealed");
  document.getElementById("mScore").textContent=commaNum(total);
  bumpScore();
  const res=document.getElementById("result");
  const perfect=mi<=PERFECT_MI;
  res.innerHTML=(perfect?`<div class="perfect">Bullseye!</div>`:"")
    +`<div><span class="lbl">Off by</span><span class="dist num">${commaNum(Math.round(mi))} mi</span></div>`
    +`<div><span class="lbl">Points</span><span class="pts num">+${commaNum(pts)}</span></div>`;
  res.classList.add("show");
  document.getElementById("hint").textContent=s[2]+" \u2014 "+s[1];
  document.getElementById("action").disabled=false;
  document.getElementById("action").textContent=(idx+1>=deck.length)?"Results":"Next";
}
function gradeFor(p){if(p>=.8)return["All-Pro","var(--amber)"];if(p>=.6)return["Starter","var(--turf)"];if(p>=.4)return["Role Player","var(--nfl)"];return["Benchwarmer","var(--muted)"];}
function endGame(){
  document.body.classList.remove("playing");
  document.removeEventListener("keydown",onKey);
  const maxScore=deck.length*MAX_PER;
  const pct=total/maxScore; const [g,gc]=gradeFor(pct);
  const avgMi=results.reduce((a,r)=>a+r.mi,0)/results.length;
  const best=results.reduce((a,r)=>r.mi<a.mi?r:a,results[0]);
  const prevBest=getBest(), isNew=prevBest==null||total>prevBest;
  if(isNew) setBest(total);
  showBest();
  document.getElementById("mRound").textContent=deck.length+"/"+deck.length;
  const rows=results.map(r=>`<div class="brow"><span class="bteam">${r.team}</span><span class="bdist num ${distClass(r.mi)}">${commaNum(Math.round(r.mi))} mi</span><span class="bpts num">+${commaNum(r.pts)}</span></div>`).join("");
  const shareText=`Stadium IQ: ${commaNum(total)}/${commaNum(maxScore)} (${g}) \u2014 avg ${commaNum(Math.round(avgMi))} mi off`;
  document.getElementById("game").innerHTML=`<div class="end"><div class="grade" style="color:${gc}">${g}</div><div class="endscore">Final score &nbsp;<b class="num">${commaNum(total)}</b>&nbsp;/ ${commaNum(maxScore)}</div>${isNew?`<div class="hiscore new">New personal best!</div>`:(prevBest!=null?`<div class="hiscore">Personal best: ${commaNum(prevBest)}</div>`:"")}<div class="stats"><div class="stat"><div class="sk">Avg distance</div><div class="sv num">${commaNum(Math.round(avgMi))} mi</div></div><div class="stat"><div class="sk">Closest guess</div><div class="sv num">${commaNum(Math.round(best.mi))} mi</div></div><div class="stat"><div class="sk">Accuracy</div><div class="sv num">${Math.round(pct*100)}%</div></div></div><div class="breakdown">${rows}</div><div class="endbtns"><button id="again">Play again</button><button class="ghost" id="share">Share score</button></div></div>`;
  document.getElementById("again").onclick=start;
  document.getElementById("share").onclick=()=>{
    if(navigator.share) navigator.share({title:"Stadium IQ",text:shareText}).catch(()=>{});
    else navigator.clipboard.writeText(shareText).then(()=>{document.getElementById("share").textContent="Copied!";});
  };
}
showBest();
document.body.classList.add("playing");
start();
